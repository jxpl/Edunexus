<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="guias.css">
    <title>Guías Estudiantiles</title>
    <!-- Aquí es donde enlazamos el archivo CSS externo -->

</head>

<body>

    <header>
        <button class="icon-btn">&#8592;</button> <!-- Flecha de retroceso -->
        <h1>guias</h1>
        <button class="icon-btn">&#9776;</button> <!-- Menú hamburguesa -->
    </header>

    <div class="container">
        <main class="grid-layout">

            <!-- Guía 1 (Verde) -->
            <div class="card">
                <img src="https://placehold.co/400x400/4CAF50/FFF?text=Ciencias\nNaturales" alt="Ciencias Naturales"
                    class="card-img">
                <p>guia de ciencias #6</p>
            </div>

            <!-- Guía 2 (Azul claro) -->
            <div class="card">
                <img src="https://placehold.co/400x400/81D4FA/000?text=Ciencias\nSociales" alt="Ciencias Sociales"
                    class="card-img">
                <p>guia de sociales #1</p>
            </div>

            <!-- Guía 3 (Amarillo) -->
            <div class="card">
                <img src="https://placehold.co/400x400/FFC107/000?text=Matematicas" alt="Matemáticas" class="card-img">
                <p>guia de matemticas #1</p>
            </div>

            <!-- Guía 4 (Rojo) -->
            <div class="card">
                <img src="https://placehold.co/400x400/F44336/FFF?text=Lenguaje" alt="Lenguaje" class="card-img">
                <p>guia de lenguaje #1</p>
            </div>

            <!-- Guía 5 (Azul oscuro) -->
            <div class="card">
                <img src="https://placehold.co/400x400/1976D2/FFF?text=Ingles" alt="Inglés" class="card-img">
                <p>guia de ingles #1</p>
            </div>

            <!-- Guía 6 (Verde oliva) -->
            <div class="card">
                <img src="https://placehold.co/400x400/689F38/FFF?text=Filosofia" alt="Filosofía" class="card-img">
                <p>guia de filosofia #3</p>
            </div>

        </main>
    </div>

</body>

</html>
