<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduNexus - Progreso</title>
    
    <!-- CSS de estilos -->
    <link rel="stylesheet" href="progreso.css">
    
    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

    <header>
        <div class="header-container">
            <h1>EduNexus</h1>
            <nav>
                <a href="../Inicio.html">Inicio</a>
                <a href="clases.html">Clases</a>
                <a href="diplomas.html">Diplomas</a>
                <a href="progreso.html" class="active">Progreso</a>
            </nav>
        </div>
    </header>

    <div id="react-progress-section"></div>

    <footer>
        <p>&copy; 2026 EduNexus. Todos los derechos reservados.</p>
    </footer>

    <script type="text/babel">
        const userProgress = [
            {
                id: 1,
                title: "Curso de Ciencias",
                category: "Ciencias",
                description: "Progreso: 18 de 24 lecciones completadas (75%).",
                lessons: "18/24",
                rating: "75%",
                url: "ciencias.html"
            },
            {
                id: 2,
                title: "Curso de Matemáticas",
                category: "Matematicas",
                description: "Progreso: 9 de 18 lecciones completadas (50%).",
                lessons: "9/18",
                rating: "50%",
                url: "matematicas.html"
            },
            {
                id: 3,
                title: "Curso de Lenguas",
                category: "Lenguas",
                description: "Progreso: 5 de 15 lecciones completadas (33%).",
                lessons: "5/15",
                rating: "33%",
                url: "lenguas.html"
            },
            {
                id: 4,
                title: "Materias Complementarias",
                category: "Complementarias",
                description: "Progreso: 6 de 15 lecciones completadas (40%).",
                lessons: "6/15",
                rating: "40%",
                url: "complementarias.html"
            }
        ];

        function ProgressSection() {
            return (
                <section className="courses-section">
                    <div className="section-header">
                        <h2>Tu Progreso Académico</h2>
                        <p>Consulta el avance de tus cursos inscritos.</p>
                    </div>

                    <div className="courses-grid">
                        {userProgress.map(course => (
                            <article key={course.id} className="course-card">
                                <div className="card-content">
                                    <span className="course-category">{course.category}</span>
                                    
                                    <h3>{course.title}</h3>
                                    
                                    <p>{course.description}</p>
                                    
                                    {course.url !== "#" && (
                                        <a href={course.url} className="btn-enter">
                                            <span>Ingresar al curso</span>
                                            <span className="arrow">&rarr;</span>
                                        </a>
                                    )}
                                </div>
                                <div className="card-footer">
                                    <span className="course-lessons">Lecciones: {course.lessons}</span>
                                    <span className="course-rating">Completado: {course.rating}</span>
                                </div>
                            </article>
                        ))}
                    </div>
                </section>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('react-progress-section'));
        root.render(<ProgressSection />);
    </script>
</body>
</html>
