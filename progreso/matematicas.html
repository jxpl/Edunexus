<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduNexus - Matemáticas</title>
    
    <!-- CSS de estilos -->
    <link rel="stylesheet" href="progreso.css">
    
    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

    <header>
        <div class="header-container">
            <h1>EduNexus</h1>
            <nav>
                <a href="../Inicio.html">Inicio</a>
                <a href="clases.html">Clases</a>
                <a href="diplomas.html">Diplomas</a>
                <a href="progreso.html" class="active">Progreso</a>
            </nav>
        </div>
    </header>

    <div id="react-matematicas-section"></div>

    <footer>
        <p>&copy; 2026 EduNexus. Todos los derechos reservados.</p>
    </footer>

    <script type="text/babel">
        const matematicasData = {
            title: "Curso de Matemáticas",
            category: "Matematicas",
            overallProgress: 50,
            lessonsCompleted: 9,
            totalLessons: 18,
            modules: [
                {
                    id: 1,
                    title: "Unidad 1: Álgebra Básica",
                    status: "Completado",
                    completedCount: 6,
                    totalCount: 6,
                    lessons: [
                        { name: "1.1 Operaciones con Fracciones y Decimales", done: true },
                        { name: "1.2 Propiedades de los Exponentes", done: true },
                        { name: "1.3 Expresiones Algebraicas y Simplificación", done: true },
                        { name: "1.4 Ecuaciones de Primer Grado", done: true },
                        { name: "1.5 Desigualdades Lineales", done: true },
                        { name: "1.6 Sistemas de Ecuaciones 2x2", done: true }
                    ]
                },
                {
                    id: 2,
                    title: "Unidad 2: Geometría y Trigonometría",
                    status: "En Progreso",
                    completedCount: 3,
                    totalCount: 6,
                    lessons: [
                        { name: "2.1 Perímetros, Áreas y Volúmenes", done: true },
                        { name: "2.2 Teorema de Pitágoras", done: true },
                        { name: "2.3 Ángulos y Triángulos Semejantes", done: true },
                        { name: "2.4 Funciones Trigonométricas Básicas", done: false },
                        { name: "2.5 Ley de Senos y Cosenos", done: false },
                        { name: "2.6 Identidades Trigonométricas", done: false }
                    ]
                },
                {
                    id: 3,
                    title: "Unidad 3: Funciones y Cálculo Introductorio",
                    status: "Pendiente",
                    completedCount: 0,
                    totalCount: 6,
                    lessons: [
                        { name: "3.1 Concepto de Función y Dominio", done: false },
                        { name: "3.2 Funciones Lineales y Cuadráticas", done: false },
                        { name: "3.3 Gráficas de Funciones", done: false },
                        { name: "3.4 Introducción a los Límites", done: false },
                        { name: "3.5 Concepto de la Derivada", done: false },
                        { name: "3.6 Aplicaciones Básicas de la Derivada", done: false }
                    ]
                }
            ]
        };

        function MatematicasSection() {
            return (
                <section className="courses-section">
                    <div className="section-header">
                        <a 
                            href="progreso.html" 
                            style={{ 
                                display: 'inline-block', 
                                color: '#2563eb', 
                                textDecoration: 'none', 
                                fontWeight: 'bold',
                                marginBottom: '12px'
                            }}
                        >
                            &larr; Volver a Progreso General
                        </a>

                        <h2>{matematicasData.title}</h2>
                        <p>Avance general: <strong>{matematicasData.overallProgress}%</strong> ({matematicasData.lessonsCompleted} de {matematicasData.totalLessons} lecciones)</p>
                    </div>

                    <div className="courses-grid">
                        {matematicasData.modules.map(module => (
                            <article key={module.id} className="course-card">
                                <div className="card-content">
                                    <span className="course-category">{matematicasData.category}</span>
                                    <h3>{module.title}</h3>
                                    <p>Avance del módulo: {module.completedCount}/{module.totalCount} lecciones</p>
                                    
                                    <ul style={{ listStyle: 'none', padding: 0, marginTop: '15px' }}>
                                        {module.lessons.map((lesson, idx) => (
                                            <li key={idx} style={{ padding: '4px 0', fontSize: '0.9em' }}>
                                                {lesson.done ? "✅ " : "⚪ "} 
                                                <span style={{ textDecoration: lesson.done ? 'line-through' : 'none', opacity: lesson.done ? 0.7 : 1 }}>
                                                    {lesson.name}
                                                </span>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                                <div className="card-footer">
                                    <span className="course-lessons">Estado: {module.status}</span>
                                    <span className="course-rating">
                                        {Math.round((module.completedCount / module.totalCount) * 100)}%
                                    </span>
                                </div>
                            </article>
                        ))}
                    </div>
                </section>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('react-matematicas-section'));
        root.render(<MatematicasSection />);
    </script>
</body>
</html>
