<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduNexus - Ciencias</title>
    
    <!-- CSS de estilos -->
    <link rel="stylesheet" href="progreso.css">
    
    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

    <header>
        <div class="header-container">
            <h1>EduNexus</h1>
            <nav>
                <a href="../Inicio.html">Inicio</a>
                <a href="clases.html">Clases</a>
                <a href="diplomas.html">Diplomas</a>
                <a href="progreso.html" class="active">Progreso</a>
            </nav>
        </div>
    </header>

    <div id="react-ciencias-section"></div>

    <footer>
        <p>&copy; 2026 EduNexus. Todos los derechos reservados.</p>
    </footer>

    <script type="text/babel">
        const cienciasData = {
            title: "Curso de Ciencias",
            category: "Ciencias",
            overallProgress: 75,
            lessonsCompleted: 18,
            totalLessons: 24,
            modules: [
                {
                    id: 1,
                    title: "Unidad 1: Biología Celular",
                    status: "Completado",
                    completedCount: 6,
                    totalCount: 6,
                    lessons: [
                        { name: "1.1 Introducción a la Célula", done: true },
                        { name: "1.2 Membrana y Transporte", done: true },
                        { name: "1.3 Organelos Celulares", done: true },
                        { name: "1.4 Respiración Celular", done: true },
                        { name: "1.5 Fotosíntesis", done: true },
                        { name: "1.6 Mitosis y Meiosis", done: true }
                    ]
                },
                {
                    id: 2,
                    title: "Unidad 2: Química General",
                    status: "Completado",
                    completedCount: 6,
                    totalCount: 6,
                    lessons: [
                        { name: "2.1 Tabla Periódica y Elementos", done: true },
                        { name: "2.2 Enlaces Químicos", done: true },
                        { name: "2.3 Estequiometría Básica", done: true },
                        { name: "2.4 Reacciones Químicas", done: true },
                        { name: "2.5 Estados de la Materia", done: true },
                        { name: "2.6 Soluciones y Concentración", done: true }
                    ]
                },
                {
                    id: 3,
                    title: "Unidad 3: Física Clásica",
                    status: "En Progreso",
                    completedCount: 6,
                    totalCount: 6,
                    lessons: [
                        { name: "3.1 Cinemática y Movimiento", done: true },
                        { name: "3.2 Leyes de Newton", done: true },
                        { name: "3.3 Trabajo y Energía", done: true },
                        { name: "3.4 Impulso y Cantidad de Movimiento", done: true },
                        { name: "3.5 Gravitación Universal", done: true },
                        { name: "3.6 Fluidos y Presión", done: true }
                    ]
                },
                {
                    id: 4,
                    title: "Unidad 4: Ecología y Medio Ambiente",
                    status: "Pendiente",
                    completedCount: 0,
                    totalCount: 6,
                    lessons: [
                        { name: "4.1 Ecosistemas y Cadenas Tróficas", done: false },
                        { name: "4.2 Ciclos Biogeoquímicos", done: false },
                        { name: "4.3 Biodiversidad", done: false },
                        { name: "4.4 Impacto Ambiental", done: false },
                        { name: "4.5 Cambio Climático", done: false },
                        { name: "4.6 Conservación y Sostenibilidad", done: false }
                    ]
                }
            ]
        };

        function CienciasSection() {
            return (
                <section className="courses-section">
                    <div className="section-header">
                        <a 
                            href="progreso.html" 
                            style={{ 
                                display: 'inline-block', 
                                color: '#2563eb', 
                                textDecoration: 'none', 
                                fontWeight: 'bold',
                                marginBottom: '12px'
                            }}
                        >
                            &larr; Volver a Progreso General
                        </a>

                        <h2>{cienciasData.title}</h2>
                        <p>Avance general: <strong>{cienciasData.overallProgress}%</strong> ({cienciasData.lessonsCompleted} de {cienciasData.totalLessons} lecciones)</p>
                    </div>

                    <div className="courses-grid">
                        {cienciasData.modules.map(module => (
                            <article key={module.id} className="course-card">
                                <div className="card-content">
                                    <span className="course-category">{cienciasData.category}</span>
                                    <h3>{module.title}</h3>
                                    <p>Avance del módulo: {module.completedCount}/{module.totalCount} lecciones</p>
                                    
                                    <ul style={{ listStyle: 'none', padding: 0, marginTop: '15px' }}>
                                        {module.lessons.map((lesson, idx) => (
                                            <li key={idx} style={{ padding: '4px 0', fontSize: '0.9em' }}>
                                                {lesson.done ? "✅ " : "⚪ "} 
                                                <span style={{ textDecoration: lesson.done ? 'line-through' : 'none', opacity: lesson.done ? 0.7 : 1 }}>
                                                    {lesson.name}
                                                </span>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                                <div className="card-footer">
                                    <span className="course-lessons">Estado: {module.status}</span>
                                    <span className="course-rating">
                                        {Math.round((module.completedCount / module.totalCount) * 100)}%
                                    </span>
                                </div>
                            </article>
                        ))}
                    </div>
                </section>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('react-ciencias-section'));
        root.render(<CienciasSection />);
    </script>
</body>
</html>
