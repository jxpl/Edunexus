<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduNexus - Materias Complementarias</title>
    
    <!-- CSS de estilos -->
    <link rel="stylesheet" href="progreso.css">
    
    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

    <header>
        <div class="header-container">
            <h1>EduNexus</h1>
            <nav>
                <a href="../Inicio.html">Inicio</a>
                <a href="clases.html">Clases</a>
                <a href="diplomas.html">Diplomas</a>
                <a href="progreso.html" class="active">Progreso</a>
            </nav>
        </div>
    </header>

    <div id="react-complementarias-section"></div>

    <footer>
        <p>&copy; 2026 EduNexus. Todos los derechos reservados.</p>
    </footer>

    <script type="text/babel">
        const complementariasData = {
            title: "Materias Complementarias",
            category: "Complementarias",
            overallProgress: 40,
            lessonsCompleted: 6,
            totalLessons: 15,
            modules: [
                {
                    id: 1,
                    title: "Unidad 1: Programación y Pensamiento Lógico",
                    status: "Completado",
                    completedCount: 5,
                    totalCount: 5,
                    lessons: [
                        { name: "1.1 Introducción a los Algoritmos", done: true },
                        { name: "1.2 Variables y Tipos de Datos", done: true },
                        { name: "1.3 Estructuras de Control y Condicionales", done: true },
                        { name: "1.4 Bucles y Ciclos de Repetición", done: true },
                        { name: "1.5 Funciones y Modularización", done: true }
                    ]
                },
                {
                    id: 2,
                    title: "Unidad 2: Educación Financiera y Emprendimiento",
                    status: "En Progreso",
                    completedCount: 1,
                    totalCount: 5,
                    lessons: [
                        { name: "2.1 Presupuesto Personal y Ahorro", done: true },
                        { name: "2.2 Gestión de Deudas e Interés Compuesto", done: false },
                        { name: "2.3 Fundamentos de Inversión", done: false },
                        { name: "2.4 Modelos de Negocio Básicos", done: false },
                        { name: "2.5 Estrategias de Marketing Digital", done: false }
                    ]
                },
                {
                    id: 3,
                    title: "Unidad 3: Habilidades Blandas y Metodología de Estudio",
                    status: "Pendiente",
                    completedCount: 0,
                    totalCount: 5,
                    lessons: [
                        { name: "3.1 Gestión Eficiente del Tiempo", done: false },
                        { name: "3.2 Técnicas de Estudio Activo y Memoria", done: false },
                        { name: "3.3 Comunicación Asertiva y Oratoria", done: false },
                        { name: "3.4 Trabajo en Equipo y Liderazgo", done: false },
                        { name: "3.5 Inteligencia Emocional y Gestión del Estrés", done: false }
                    ]
                }
            ]
        };

        function ComplementariasSection() {
            return (
                <section className="courses-section">
                    <div className="section-header">
                        <a href="progreso.html" className="btn-back">
                            <span className="arrow">&larr;</span> Volver al Progreso
                        </a>

                        <h2>{complementariasData.title}</h2>
                        <p>Avance general: <strong>{complementariasData.overallProgress}%</strong> ({complementariasData.lessonsCompleted} de {complementariasData.totalLessons} lecciones)</p>
                    </div>

                    <div className="courses-grid">
                        {complementariasData.modules.map(module => (
                            <article key={module.id} className="course-card">
                                <div className="card-content">
                                    <span className="course-category">{complementariasData.category}</span>
                                    <h3>{module.title}</h3>
                                    <p>Avance del módulo: {module.completedCount}/{module.totalCount} lecciones</p>
                                    
                                    <ul style={{ listStyle: 'none', padding: 0, marginTop: '15px' }}>
                                        {module.lessons.map((lesson, idx) => (
                                            <li key={idx} style={{ padding: '4px 0', fontSize: '0.9em' }}>
                                                {lesson.done ? "✅ " : "⚪ "} 
                                                <span style={{ textDecoration: lesson.done ? 'line-through' : 'none', opacity: lesson.done ? 0.7 : 1 }}>
                                                    {lesson.name}
                                                </span>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                                <div className="card-footer">
                                    <span className="course-lessons">Estado: {module.status}</span>
                                    <span className="course-rating">
                                        {Math.round((module.completedCount / module.totalCount) * 100)}%
                                    </span>
                                </div>
                            </article>
                        ))}
                    </div>
                </section>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('react-complementarias-section'));
        root.render(<ComplementariasSection />);
    </script>
</body>
</html>
